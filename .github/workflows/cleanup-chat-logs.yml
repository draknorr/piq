name: Cleanup Chat Logs

on:
  schedule:
    - cron: '0 3 * * *' # Daily at 3 AM UTC
  workflow_dispatch: # Manual trigger

jobs:
  cleanup:
    runs-on: ubuntu-latest
    env:
      TIGER_PRIMARY_URL: ${{ secrets.TIGER_PRODUCTION_URL }}
    steps:
      - name: Install PostgreSQL client
        run: sudo apt-get update && sudo apt-get install -y --no-install-recommends postgresql-client

      - name: Cleanup old chat logs (7-day retention)
        run: |
          set -euo pipefail
          psql "$TIGER_PRIMARY_URL" -X -v ON_ERROR_STOP=1 \
            -c "SELECT chat.cleanup_old_chat_logs();"
